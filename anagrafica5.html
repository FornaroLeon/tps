<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Dati Personali</title>

<style>
.error{
color:red;
font-size:12px;
}
</style>

</head>

<body>

<h1>Gestione Dati Personali</h1>

<form id="formDati">

Nome: <input type="text" id="nome" required>
<span id="errNome" class="error"></span>
<br>

Cognome: <input type="text" id="cognome" required>
<span id="errCognome" class="error"></span>
<br>

Età: <input type="number" id="eta" required><br>

CAP: <input type="text" id="cap" required>
<span id="errCap" class="error"></span>
<br>

Professione: <input type="text" id="professione" required><br>

Email: <input type="text" id="email" required>
<span id="errEmail" class="error"></span>
<br>

<button type="submit">Salva</button>

</form>

<hr>

<table border="1">
<thead>
<tr>
<th>Nome</th>
<th>Cognome</th>
<th>Età</th>
<th>CAP</th>
<th>Professione</th>
<th>Email</th>
</tr>
</thead>

<tbody id="tabellaDati"></tbody>

</table>

<script>

const form = document.getElementById('formDati');
const tabella = document.getElementById('tabellaDati');
const elenco = JSON.parse(localStorage.getItem('elenco')) || [];

/* REGEX SEMPLICI */

const regexNome = /^[A-Za-z]+$/;
const regexCap = /^[0-9]+$/;
const regexEmail = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,6}$/;

form.addEventListener('submit', function(e){

e.preventDefault();

/* PULISCO ERRORI */

document.getElementById("errNome").textContent="";
document.getElementById("errCognome").textContent="";
document.getElementById("errCap").textContent="";
document.getElementById("errEmail").textContent="";

/* PRENDO I VALORI */

let nome = document.getElementById('nome').value;
let cognome = document.getElementById('cognome').value;
let eta = document.getElementById('eta').value;
let cap = document.getElementById('cap').value;
let professione = document.getElementById('professione').value;
let email = document.getElementById('email').value;

let valido = true;

/* CONTROLLI */

if(!regexNome.test(nome)){
document.getElementById("errNome").textContent="Solo lettere";
valido=false;
}

if(!regexNome.test(cognome)){
document.getElementById("errCognome").textContent="Solo lettere";
valido=false;
}

if(!regexCap.test(cap)){
document.getElementById("errCap").textContent="Solo numeri";
valido=false;
}

if(!regexEmail.test(email)){
document.getElementById("errEmail").textContent="Email non valida";
valido=false;
}

/* SALVATAGGIO */

if(valido){

const persona = {
nome:nome,
cognome:cognome,
eta:eta,
cap:cap,
professione:professione,
email:email
};

elenco.push(persona);

localStorage.setItem('elenco', JSON.stringify(elenco));

form.reset();

mostraDati();

}

});

function mostraDati(){

tabella.innerHTML="";

for(let i=0;i<elenco.length;i++){

let riga = document.createElement("tr");

riga.innerHTML =
"<td>"+elenco[i].nome+"</td>"+
"<td>"+elenco[i].cognome+"</td>"+
"<td>"+elenco[i].eta+"</td>"+
"<td>"+elenco[i].cap+"</td>"+
"<td>"+elenco[i].professione+"</td>"+
"<td>"+elenco[i].email+"</td>";

tabella.appendChild(riga);

}

}

mostraDati();

</script>

</body>
</html>
